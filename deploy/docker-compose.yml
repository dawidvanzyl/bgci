services:

  bgci-api:
    image: ghcr.io/dawidvanzyl/bgci-api:latest
    container_name: bgci-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Path=/data/bgci.db
      - Bgg__BearerToken=${BGG_BEARER_TOKEN}
    volumes:
      - bgci-data:/data
    networks:
      - bgci-net

  bgci-web:
    image: ghcr.io/dawidvanzyl/bgci-web:latest
    container_name: bgci-web
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      - bgci-api
    networks:
      - bgci-net

volumes:
  bgci-data:
    name: bgci-data

networks:
  bgci-net:
    name: bgci-net
