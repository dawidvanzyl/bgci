name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test-api:
    name: Build & Test Api
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/bgci.slnx

      - name: Build
        run: dotnet build src/bgci.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/bgci.slnx --no-build --configuration Release --verbosity normal

  build-node:
    name: Build bgg-writer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: node/bgg-writer

      - name: Lint
        run: npm run lint
        working-directory: node/bgg-writer

      - name: Check syntax
        run: |
          node --check src/index.js
          node --check src/bggWriter.js
        working-directory: node/bgg-writer
