name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/bgci.slnx

      - name: Build
        run: dotnet build src/bgci.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/bgci.slnx --no-build --configuration Release --verbosity normal
