name: Publish Docker Images

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dawidvanzyl/bgci-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: VERSION=${{ steps.meta-api.outputs.version }}

      - name: Extract metadata for Web image
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dawidvanzyl/bgci-web
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

      - name: Extract metadata for Writer image
        id: meta-writer
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dawidvanzyl/bgci-writer
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Writer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.writer
          push: true
          tags: ${{ steps.meta-writer.outputs.tags }}
          labels: ${{ steps.meta-writer.outputs.labels }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deploy/docker-compose.yml
            deploy/.env.example
