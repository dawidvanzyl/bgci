services:

  bgci-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bgci-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Path=/data/bgci.db
    volumes:
      - bgci-data:/data
    networks:
      - bgci-net

  bgci-web:
    image: nginx:alpine
    container_name: bgci-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bgci-api
    networks:
      - bgci-net

volumes:
  bgci-data:
    name: bgci-data

networks:
  bgci-net:
    name: bgci-net
